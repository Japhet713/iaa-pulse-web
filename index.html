<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>IAA Pulse - Campus Safety & Information</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="card shadow">
                    <div class="card-body p-4">
                        <div class="text-center mb-4">
                            <img src="assets/images/logo.png" alt="IAA Logo" height="80" onerror="this.style.display='none'">
                            <h2 class="mt-3">IAA Pulse</h2>
                            <p class="text-muted">Official Campus Information System</p>
                        </div>
                        
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="email" class="form-label">Email Address</label>
                                <input type="email" class="form-control" id="email" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="password" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Login</button>
                        </form>
                        
                        <div class="text-center mt-3">
                            <a href="#" id="forgotPassword">Forgot Password?</a>
                        </div>
                        
                        <div id="errorMessage" class="alert alert-danger mt-3 d-none"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { getAuth, signInWithEmailAndPassword, setPersistence, browserLocalPersistence } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
        import { getAuth, signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';
        
const firebaseConfig = {
  apiKey: "AIzaSyCUYeXvkrrIpAOgCrRr7YUXKrrAo0CR-YE",
  authDomain: "iaa-pulse-web.firebaseapp.com",
  projectId: "iaa-pulse-web",
  storageBucket: "iaa-pulse-web.firebasestorage.app",
  messagingSenderId: "383584068249",
  appId: "1:383584068249:web:70a18a9c8c8f6a77878e08"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        
        // Handle login
        const loginForm = document.getElementById('loginForm');
        const errorDiv = document.getElementById('errorMessage');
        
        loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    
    try {
        // Set persistence to keep user logged in
        await setPersistence(auth, browserLocalPersistence);
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        console.log("Login successful:", userCredential.user.email);
        window.location.href = 'dashboard.html';
    } catch (error) {
        console.error("Login error:", error.message);
        errorDiv.textContent = error.message;
        errorDiv.classList.remove('d-none');
    }
});
    </script>
</body>
</html>
