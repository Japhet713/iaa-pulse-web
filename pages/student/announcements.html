<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Announcements - IAA Pulse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/dashboard.html">
                <i class="fas fa-broadcast-tower"></i> IAA Pulse
            </a>
            <button class="btn btn-outline-light" onclick="window.location.href='/dashboard.html'">
                <i class="fas fa-arrow-left"></i> Back
            </button>
        </div>
    </nav>

    <div class="container mt-4">
        <h3><i class="fas fa-bullhorn text-primary"></i> Official Announcements</h3>
        
        <!-- Filter Buttons -->
        <div class="row mt-3 mb-3">
            <div class="col-12">
                <div class="btn-group flex-wrap" role="group">
                    <button class="btn btn-outline-primary filter-btn active" data-category="all">All</button>
                    <button class="btn btn-outline-primary filter-btn" data-category="academic">Academic</button>
                    <button class="btn btn-outline-primary filter-btn" data-category="exams">Exams</button>
                    <button class="btn btn-outline-primary filter-btn" data-category="fees">Fees</button>
                    <button class="btn btn-outline-primary filter-btn" data-category="events">Events</button>
                    <button class="btn btn-outline-primary filter-btn" data-category="general">General</button>
                </div>
            </div>
        </div>

        <!-- Announcements List -->
        <div id="announcementsList" class="row">
            <div class="col-12 text-center">
                <div class="loader"></div>
                <p>Loading announcements...</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
        import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';
        import { getFirestore, collection, query, orderBy, getDocs, where } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';
        
        // Your Firebase Config (REPLACE WITH YOURS)
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        let allAnnouncements = [];
        let currentFilter = 'all';
        
        // Check if user is logged in
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = '/index.html';
            }
        });
        
        // Load announcements from Firestore
        async function loadAnnouncements() {
            try {
                const announcementsRef = collection(db, 'announcements');
                const q = query(announcementsRef, orderBy('publishedAt', 'desc'));
                const querySnapshot = await getDocs(q);
                
                allAnnouncements = [];
                querySnapshot.forEach((doc) => {
                    allAnnouncements.push({
                        id: doc.id,
                        ...doc.data()
                    });
                });
                
                displayAnnouncements();
            } catch (error) {
                console.error("Error loading announcements:", error);
                document.getElementById('announcementsList').innerHTML = `
                    <div class="col-12">
                        <div class="alert alert-danger">Failed to load announcements. Please try again later.</div>
                    </div>
                `;
            }
        }
        
        // Display announcements based on filter
        function displayAnnouncements() {
            let filtered = allAnnouncements;
            if (currentFilter !== 'all') {
                filtered = allAnnouncements.filter(a => a.category === currentFilter);
            }
            
            if (filtered.length === 0) {
                document.getElementById('announcementsList').innerHTML = `
                    <div class="col-12">
                        <div class="alert alert-info">No announcements found.</div>
                    </div>
                `;
                return;
            }
            
            let html = '';
            filtered.forEach(ann => {
                const isCritical = ann.isCritical ? 'announcement-critical' : '';
                const categoryBadge = getCategoryBadge(ann.category);
                const date = ann.publishedAt?.toDate() ? new Date(ann.publishedAt.toDate()).toLocaleDateString() : 'Recent';
                
                html += `
                    <div class="col-md-6 col-lg-4 mb-3">
                        <div class="card h-100 shadow-sm ${isCritical}">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-start">
                                    <span class="badge ${categoryBadge} mb-2">${ann.category || 'General'}</span>
                                    ${ann.isCritical ? '<span class="badge bg-danger">URGENT</span>' : ''}
                                </div>
                                <h5 class="card-title">${escapeHtml(ann.title)}</h5>
                                <p class="card-text text-muted small">${date}</p>
                                <p class="card-text">${escapeHtml(ann.body.substring(0, 150))}${ann.body.length > 150 ? '...' : ''}</p>
                                ${ann.attachments ? '<i class="fas fa-paperclip text-muted"></i> Has attachment' : ''}
                            </div>
                        </div>
                    </div>
                `;
            });
            
            document.getElementById('announcementsList').innerHTML = html;
        }
        
        function getCategoryBadge(category) {
            const badges = {
                'academic': 'bg-primary',
                'exams': 'bg-danger',
                'fees': 'bg-warning text-dark',
                'events': 'bg-success',
                'general': 'bg-secondary'
            };
            return badges[category] || 'bg-secondary';
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Filter button handlers
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.category;
                displayAnnouncements();
            });
        });
        
        // Load announcements on page load
        loadAnnouncements();
    </script>
</body>
</html>
